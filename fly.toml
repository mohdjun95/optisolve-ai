# fly.toml — Fly.io deployment configuration
# Run `fly launch` to initialize, then `fly deploy` to deploy.

app = "optisolve-ai"
primary_region = "ord"  # Chicago — change to nearest region

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
